<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSMA Component Explorer</title>

    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="index.css">

    <style>
        /* Explorer Layout */
        :root {
            --sidebar-width: 260px;
            --header-height: 56px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--fx-color-bg);
            color: var(--fx-color-fg);
            font-family: var(--fx-font-family-base);
            overflow: hidden;
        }

        /* Header */
        .explorer-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--fx-color-surface);
            border-bottom: 1px solid var(--fx-color-border);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            min-height: var(--header-height);
            padding: var(--fx-space-sm) var(--fx-space-md);
            gap: var(--fx-space-md);
            z-index: 100;
        }

        .explorer-logo {
            font-size: var(--fx-font-size-lg);
            font-weight: var(--fx-font-weight-bold);
            color: var(--fx-color-fg);
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .explorer-search {
            flex: 1;
            min-width: min(100%, 16rem);
            max-width: 26rem;
            position: relative;
        }

        .explorer-search input {
            width: 100%;
            padding: var(--fx-space-sm) var(--fx-space-md);
            padding-left: 2.5rem;
            background: var(--fx-color-bg);
            border: 1px solid var(--fx-color-border);
            border-radius: var(--fx-radius-md);
            font-size: var(--fx-font-size-sm);
            color: var(--fx-color-fg);
            transition: all var(--fx-transition-fast);
        }

        .explorer-search input:focus {
            outline: none;
            border-color: var(--fx-color-primary);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--fx-color-primary) 14%, transparent);
        }

        .explorer-search input::placeholder {
            color: var(--fx-color-fg-muted);
        }

        .explorer-search-icon {
            position: absolute;
            left: var(--fx-space-sm);
            top: 50%;
            transform: translateY(-50%);
            width: 1rem;
            height: 1rem;
            color: var(--fx-color-fg-muted);
        }

        .explorer-header-actions {
            display: flex;
            align-items: center;
            gap: var(--fx-space-sm);
            margin-left: auto;
        }

        .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.5rem;
            height: 2.5rem;
            border: 1px solid var(--fx-color-border);
            border-radius: var(--fx-radius-full);
            background: var(--fx-color-surface);
            color: var(--fx-color-fg);
            cursor: pointer;
            transition: background var(--fx-transition-fast), border-color var(--fx-transition-fast), color var(--fx-transition-fast);
        }

        .theme-toggle:hover {
            background: var(--fx-color-bg-muted);
            border-color: var(--fx-color-fg-muted);
        }

        .theme-toggle-icon {
            width: 1.125rem;
            height: 1.125rem;
        }

        /* Sidebar */
        .explorer-sidebar {
            position: fixed;
            top: var(--header-height);
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--fx-color-surface);
            border-right: 1px solid var(--fx-color-border);
            overflow-y: auto;
            z-index: 90;
        }

        .sidebar-section {
            padding: var(--fx-space-sm) 0;
        }

        .sidebar-section-title {
            padding: var(--fx-space-xs) var(--fx-space-md);
            font-size: var(--fx-font-size-xs);
            font-weight: var(--fx-font-weight-semibold);
            color: var(--fx-color-fg-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sidebar-nav {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .sidebar-nav-item {
            margin: 0;
        }

        .sidebar-nav-link {
            display: flex;
            align-items: center;
            gap: var(--fx-space-sm);
            padding: var(--fx-space-xs) var(--fx-space-md);
            color: var(--fx-color-fg-muted);
            text-decoration: none;
            font-size: var(--fx-font-size-sm);
            transition: all var(--fx-transition-fast);
            border-left: 2px solid transparent;
        }

        .sidebar-nav-link:hover {
            color: var(--fx-color-fg);
            background: var(--fx-color-bg-muted);
        }

        .sidebar-nav-link.active {
            color: var(--fx-color-primary);
            background: color-mix(in srgb, var(--fx-color-primary) 8%, transparent);
            border-left-color: var(--fx-color-primary);
        }

        .sidebar-nav-link[data-badge]::after {
            content: attr(data-badge);
            margin-left: auto;
            font-size: var(--fx-font-size-xs);
            font-weight: var(--fx-font-weight-semibold);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.125rem 0.45rem;
            background: color-mix(in srgb, var(--fx-color-primary) 12%, transparent);
            color: var(--fx-color-primary);
            border-radius: 9999px;
        }

        .sidebar-nav-link[data-badge="css"]::after {
            background: color-mix(in srgb, var(--fx-color-success) 16%, transparent);
            color: color-mix(in srgb, var(--fx-color-success) 72%, black 28%);
        }

        .sidebar-nav-link[data-badge="js"]::after {
            background: color-mix(in srgb, var(--fx-color-warning) 18%, transparent);
            color: color-mix(in srgb, var(--fx-color-warning) 72%, black 28%);
        }

        /* Main Content */
        .explorer-main {
            position: fixed;
            top: var(--header-height);
            left: var(--sidebar-width);
            right: 0;
            bottom: 0;
            overflow-y: auto;
            padding: var(--fx-space-lg);
        }

        /* Component Section */
        .component-section {
            margin-bottom: var(--fx-space-2xl);
            scroll-margin-top: calc(var(--header-height) + var(--fx-space-lg));
        }

        .component-header {
            margin-bottom: var(--fx-space-lg);
            padding-bottom: var(--fx-space-md);
            border-bottom: 1px solid var(--fx-color-border);
        }

        .component-header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--fx-space-md);
            flex-wrap: wrap;
        }

        .component-title {
            font-size: var(--fx-font-size-2xl);
            font-weight: var(--fx-font-weight-bold);
            margin: 0 0 var(--fx-space-xs) 0;
            display: flex;
            align-items: center;
            gap: var(--fx-space-sm);
        }

        .component-description {
            color: var(--fx-color-fg-muted);
            margin: 0;
            max-width: 60ch;
        }

        .runtime-section {
            margin-bottom: var(--fx-space-xl);
        }

        .runtime-card {
            display: grid;
            grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
            gap: var(--fx-space-lg);
            padding: var(--fx-space-lg);
            background:
                radial-gradient(circle at top right, color-mix(in srgb, var(--fx-color-primary) 8%, transparent), transparent 34%),
                linear-gradient(180deg, var(--fx-color-surface), var(--fx-color-bg));
            border: 1px solid var(--fx-color-border);
            border-radius: var(--fx-radius-xl);
        }

        .runtime-title {
            margin: 0 0 var(--fx-space-xs) 0;
            font-size: var(--fx-font-size-xl);
            font-weight: var(--fx-font-weight-bold);
        }

        .runtime-summary {
            margin: 0;
            color: var(--fx-color-fg-muted);
            line-height: 1.6;
            max-width: 62ch;
        }

        .runtime-metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: var(--fx-space-sm);
            align-content: start;
        }

        .runtime-metric {
            padding: var(--fx-space-sm) var(--fx-space-md);
            background: var(--fx-color-bg);
            border: 1px solid var(--fx-color-border);
            border-radius: var(--fx-radius-lg);
        }

        .runtime-metric-label {
            display: block;
            font-size: var(--fx-font-size-xs);
            color: var(--fx-color-fg-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: var(--fx-space-2xs);
        }

        .runtime-metric-value {
            font-size: var(--fx-font-size-lg);
            font-weight: var(--fx-font-weight-semibold);
        }

        .runtime-budget {
            grid-column: 1 / -1;
            padding: var(--fx-space-md);
            background: var(--fx-color-bg-muted);
            border-radius: var(--fx-radius-lg);
            color: var(--fx-color-fg-muted);
            font-size: var(--fx-font-size-sm);
            line-height: 1.5;
        }

        .component-demo-link {
            display: inline-flex;
            align-items: center;
            gap: var(--fx-space-xs);
            padding: var(--fx-space-xs) var(--fx-space-sm);
            border: 1px solid var(--fx-color-border);
            border-radius: var(--fx-radius-md);
            color: var(--fx-color-fg-muted);
            text-decoration: none;
            font-size: var(--fx-font-size-xs);
            white-space: nowrap;
            transition: all var(--fx-transition-fast);
        }

        .component-demo-link:hover {
            color: var(--fx-color-fg);
            background: var(--fx-color-bg-muted);
        }

        /* Preview + Code Grid */
        .component-demo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--fx-space-md);
            margin-bottom: var(--fx-space-lg);
        }

        @media (max-width: 1024px) {
            .runtime-card {
                grid-template-columns: 1fr;
            }

            .component-demo {
                grid-template-columns: 1fr;
            }
        }

        /* Preview Panel */
        .preview-panel {
            background: var(--fx-color-surface);
            border: 1px solid var(--fx-color-border);
            border-radius: var(--fx-radius-lg);
            overflow: visible;
        }

        .preview-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--fx-space-sm) var(--fx-space-md);
            background: var(--fx-color-bg-muted);
            border-bottom: 1px solid var(--fx-color-border);
            font-size: var(--fx-font-size-xs);
            font-weight: var(--fx-font-weight-semibold);
            color: var(--fx-color-fg-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .preview-panel-content {
            padding: var(--fx-space-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            overflow: visible;
            background: 
                linear-gradient(45deg, var(--fx-color-bg-muted) 25%, transparent 25%),
                linear-gradient(-45deg, var(--fx-color-bg-muted) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, var(--fx-color-bg-muted) 75%),
                linear-gradient(-45deg, transparent 75%, var(--fx-color-bg-muted) 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
        }

        .preview-panel-content[data-background="solid"] {
            background: var(--fx-color-surface);
        }

        /* Code Panel */
        .code-panel {
            background: var(--fx-color-surface);
            border: 1px solid var(--fx-color-border);
            border-radius: var(--fx-radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .code-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--fx-space-sm) var(--fx-space-md);
            background: var(--fx-color-bg-muted);
            border-bottom: 1px solid var(--fx-color-border);
        }

        .code-panel-tabs {
            display: flex;
            gap: var(--fx-space-xs);
        }

        .code-tab {
            padding: var(--fx-space-2xs) var(--fx-space-sm);
            background: transparent;
            border: none;
            border-radius: var(--fx-radius-sm);
            font-size: var(--fx-font-size-xs);
            font-weight: var(--fx-font-weight-medium);
            color: var(--fx-color-fg-muted);
            cursor: pointer;
            transition: all var(--fx-transition-fast);
        }

        .code-tab:hover {
            color: var(--fx-color-fg);
        }

        .code-tab.active {
            background: var(--fx-color-surface);
            color: var(--fx-color-fg);
        }

        .copy-btn {
            display: flex;
            align-items: center;
            gap: var(--fx-space-xs);
            padding: var(--fx-space-2xs) var(--fx-space-sm);
            background: var(--fx-color-surface);
            border: 1px solid var(--fx-color-border);
            border-radius: var(--fx-radius-sm);
            font-size: var(--fx-font-size-xs);
            color: var(--fx-color-fg-muted);
            cursor: pointer;
            transition: all var(--fx-transition-fast);
        }

        .copy-btn:hover {
            background: var(--fx-color-bg-muted);
            color: var(--fx-color-fg);
        }

        .copy-btn[data-copied="true"] {
            background: var(--fx-color-success);
            color: var(--fx-color-on-success);
            border-color: var(--fx-color-success);
        }

        .code-panel-content {
            flex: 1;
            overflow: auto;
            margin: 0;
        }

        .code-block {
            display: none;
            padding: var(--fx-space-md);
            margin: 0;
            font-family: var(--fx-font-family-mono);
            font-size: var(--fx-font-size-xs);
            line-height: 1.6;
            color: var(--fx-color-fg);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .code-block.active {
            display: block;
        }

        /* Syntax highlighting */
        .code-block .tag { color: hsl(262 83% 58%); }
        .code-block .attr { color: hsl(221 83% 53%); }
        .code-block .string { color: hsl(142 71% 36%); }
        .code-block .comment { color: var(--fx-color-fg-muted); font-style: italic; }

        :root[data-theme="dark"] .code-block .tag {
            color: hsl(263 70% 72%);
        }

        :root[data-theme="dark"] .code-block .attr {
            color: hsl(213 94% 74%);
        }

        :root[data-theme="dark"] .code-block .string {
            color: hsl(142 69% 58%);
        }

        /* Variants showcase */
        .variants-grid {
            display: flex;
            flex-wrap: wrap;
            gap: var(--fx-space-sm);
            padding: var(--fx-space-lg);
        }

        .variant-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--fx-space-xs);
        }

        .variant-label {
            font-size: var(--fx-font-size-xs);
            color: var(--fx-color-fg-muted);
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: var(--fx-space-2xl);
            color: var(--fx-color-fg-muted);
        }

        .no-results-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto var(--fx-space-md);
            opacity: 0.5;
        }

        /* Mobile sidebar toggle */
        .sidebar-toggle {
            display: none;
            padding: var(--fx-space-xs);
            background: transparent;
            border: none;
            color: var(--fx-color-fg);
            cursor: pointer;
        }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: var(--header-height) 0 0 0;
            background: rgba(0, 0, 0, 0.32);
            z-index: 80;
        }

        .sidebar-backdrop.open {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar-toggle {
                display: flex;
            }

            .explorer-header {
                align-items: center;
            }

            .explorer-logo {
                order: 1;
            }

            .explorer-header-actions {
                order: 2;
                margin-left: 0;
            }

            .explorer-search {
                order: 3;
                flex-basis: 100%;
                max-width: none;
            }

            .explorer-sidebar {
                transform: translateX(-100%);
                transition: transform var(--fx-transition-normal);
                width: min(85vw, 20rem);
                z-index: 90;
            }

            .explorer-sidebar.open {
                transform: translateX(0);
            }

            .explorer-main {
                left: 0;
                padding: var(--fx-space-md);
            }

            .runtime-metrics {
                grid-template-columns: 1fr;
            }

            .component-title {
                font-size: var(--fx-font-size-xl);
            }

            .preview-panel-content {
                padding: var(--fx-space-md);
                min-height: 160px;
                justify-content: flex-start;
                overflow-x: auto;
            }
        }

        @media (max-width: 640px) {
            .explorer-header {
                gap: var(--fx-space-sm);
                padding-inline: var(--fx-space-sm);
            }

            .runtime-card,
            .preview-panel,
            .code-panel {
                border-radius: var(--fx-radius-md);
            }

            .code-panel-header {
                flex-wrap: wrap;
                gap: var(--fx-space-sm);
            }
        }

        /* Scrollbar styling */
        .explorer-sidebar::-webkit-scrollbar,
        .explorer-main::-webkit-scrollbar,
        .code-panel-content::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .explorer-sidebar::-webkit-scrollbar-track,
        .explorer-main::-webkit-scrollbar-track,
        .code-panel-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .explorer-sidebar::-webkit-scrollbar-thumb,
        .explorer-main::-webkit-scrollbar-thumb,
        .code-panel-content::-webkit-scrollbar-thumb {
            background: var(--fx-color-border);
            border-radius: 4px;
        }

        .explorer-sidebar::-webkit-scrollbar-thumb:hover,
        .explorer-main::-webkit-scrollbar-thumb:hover,
        .code-panel-content::-webkit-scrollbar-thumb:hover {
            background: var(--fx-color-fg-muted);
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="explorer-header">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>

        <div class="explorer-logo" aria-label="CSMA Components">
            CSMA Components
        </div>

        <div class="explorer-search">
            <svg class="explorer-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="search" id="searchInput" placeholder="Search components..." autocomplete="off">
        </div>

        <div class="explorer-header-actions">
            <button class="theme-toggle" id="themeToggle" data-theme-toggle aria-label="Toggle theme">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-toggle-icon icon-sun">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2"></path>
                    <path d="M12 20v2"></path>
                    <path d="m4.93 4.93 1.41 1.41"></path>
                    <path d="m17.66 17.66 1.41 1.41"></path>
                    <path d="M2 12h2"></path>
                    <path d="M20 12h2"></path>
                    <path d="m6.34 17.66-1.41 1.41"></path>
                    <path d="m19.07 4.93-1.41 1.41"></path>
                </svg>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-toggle-icon icon-moon" style="display:none;">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                </svg>
            </button>
        </div>
    </header>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- Sidebar -->
    <aside class="explorer-sidebar" id="sidebar">
        <nav class="sidebar-section" id="sidebarNav">
            <!-- Populated by JS -->
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="explorer-main" id="mainContent">
        <!-- Populated by JS -->
    </main>

    <script type="module">
        import { componentRegistry } from './component-registry.js';
        import { initUI } from '../init.js';
        import { EventBus } from '../../runtime/EventBus.js';
        import { Contracts } from '../../runtime/Contracts.js';

        const eventBus = new EventBus();
        eventBus.contracts = Contracts;
        window.csma = window.csma || {};
        window.csma.explorerBus = eventBus;
        const explorerMetrics = window.csma.explorerMetrics = window.csma.explorerMetrics || {
            renderCount: 0,
            lastRenderDurationMs: 0
        };
        let uiCleanup = () => {};
        let observer = null;

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const header = document.querySelector('.explorer-header');
        const html = document.documentElement;
        const iconSun = themeToggle.querySelector('.icon-sun');
        const iconMoon = themeToggle.querySelector('.icon-moon');

        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const savedTheme = localStorage.getItem('theme') || systemTheme;
        html.dataset.theme = savedTheme;
        updateThemeIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            requestAnimationFrame(() => {
                const nextTheme = html.dataset.theme || localStorage.getItem('theme') || 'light';
                updateThemeIcon(nextTheme);
            });
        });

        function updateThemeIcon(theme) {
            iconSun.style.display = theme === 'dark' ? 'block' : 'none';
            iconMoon.style.display = theme === 'dark' ? 'none' : 'block';
        }

        // Mobile sidebar toggle
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarBackdrop = document.getElementById('sidebarBackdrop');
        const main = document.getElementById('mainContent');
        const searchInput = document.getElementById('searchInput');

        function syncHeaderHeight() {
            document.documentElement.style.setProperty('--header-height', `${header.offsetHeight}px`);
        }

        function setSidebarOpen(isOpen) {
            sidebar.classList.toggle('open', isOpen);
            sidebarBackdrop.classList.toggle('open', isOpen);
        }

        syncHeaderHeight();
        window.addEventListener('resize', syncHeaderHeight);

        sidebarToggle.addEventListener('click', () => {
            setSidebarOpen(!sidebar.classList.contains('open'));
        });

        sidebarBackdrop.addEventListener('click', () => {
            setSidebarOpen(false);
        });

        main.addEventListener('click', (event) => {
            const actionEl = event.target.closest('[data-intent-event]');
            if (!actionEl || !main.contains(actionEl)) return;

            event.preventDefault();

            const eventName = actionEl.dataset.intentEvent;
            const payload = {};
            Object.entries(actionEl.dataset).forEach(([key, value]) => {
                if (!key.startsWith('intent') || key === 'intentEvent') return;
                const payloadKey = key.charAt(6).toLowerCase() + key.slice(7);
                payload[payloadKey] = coerceDatasetValue(value);
            });

            if (eventName === 'INTENT_COMMAND_OPEN' && !payload.trigger) {
                payload.trigger = 'click';
            }

            if (requiresTimestamp(eventName)) {
                payload.timestamp = Date.now();
            }

            eventBus.publish(eventName, payload);
        });

        // Render sidebar navigation
        function renderSidebar(filter = '') {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';
            
            const categories = {};
            
            componentRegistry.forEach(comp => {
                if (filter && !comp.name.toLowerCase().includes(filter.toLowerCase()) && 
                    !comp.description.toLowerCase().includes(filter.toLowerCase())) {
                    return;
                }
                
                if (!categories[comp.category]) {
                    categories[comp.category] = [];
                }
                categories[comp.category].push(comp);
            });
            
            const categoryOrder = ['CSS-Only', 'Form', 'Interactive', 'Overlay', 'Navigation', 'Data', 'Layout'];
            
            categoryOrder.forEach(cat => {
                if (!categories[cat]) return;
                
                const section = document.createElement('div');
                section.className = 'sidebar-section';
                
                const title = document.createElement('div');
                title.className = 'sidebar-section-title';
                title.textContent = cat;
                section.appendChild(title);
                
                const list = document.createElement('ul');
                list.className = 'sidebar-nav';
                
                categories[cat].forEach(comp => {
                    const item = document.createElement('li');
                    item.className = 'sidebar-nav-item';
                    
                    const link = document.createElement('a');
                    link.href = `#${comp.id}`;
                    link.className = 'sidebar-nav-link';
                    link.dataset.id = comp.id;
                    if (comp.type) link.dataset.badge = comp.type;
                    link.textContent = comp.name;
                    
                    link.addEventListener('click', (e) => {
                        document.querySelectorAll('.sidebar-nav-link').forEach(l => l.classList.remove('active'));
                        link.classList.add('active');
                        
                        // Close mobile sidebar
                        setSidebarOpen(false);
                    });
                    
                    item.appendChild(link);
                    list.appendChild(item);
                });
                
                section.appendChild(list);
                nav.appendChild(section);
            });
            
            if (Object.keys(categories).length === 0) {
                nav.innerHTML = '<div class="no-results"><p>No components found</p></div>';
            }
        }
        
        // Render component content
        function renderComponents(filter = '') {
            main.innerHTML = '';
            
            const filtered = componentRegistry.filter(comp => {
                if (filter) {
                    return comp.name.toLowerCase().includes(filter.toLowerCase()) ||
                           comp.description.toLowerCase().includes(filter.toLowerCase());
                }
                return true;
            });
            
            if (filtered.length === 0) {
                main.innerHTML = `
                    <div class="no-results">
                        <svg class="no-results-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <p>No components found matching "${filter}"</p>
                    </div>
                `;
                return;
            }

            const runtimeSection = document.createElement('section');
            runtimeSection.className = 'runtime-section';
            runtimeSection.innerHTML = `
                <div class="runtime-card">
                    <div>
                        <h2 class="runtime-title">CSMA Runtime Snapshot</h2>
                        <p class="runtime-summary">
                            The explorer now uses the same EventBus, contracts, and component lifecycle as the rest of CSMA.
                            These metrics show current render cost, last shared UI bootstrap time, and rerender volume.
                        </p>
                    </div>
                    <div class="runtime-metrics">
                        <div class="runtime-metric">
                            <span class="runtime-metric-label">Last Render</span>
                            <span class="runtime-metric-value" id="runtime-render-ms">--</span>
                        </div>
                        <div class="runtime-metric">
                            <span class="runtime-metric-label">UI Init</span>
                            <span class="runtime-metric-value" id="runtime-init-ms">--</span>
                        </div>
                        <div class="runtime-metric">
                            <span class="runtime-metric-label">Renders</span>
                            <span class="runtime-metric-value" id="runtime-render-count">0</span>
                        </div>
                        <div class="runtime-metric">
                            <span class="runtime-metric-label">Cleanup Count</span>
                            <span class="runtime-metric-value" id="runtime-cleanup-count">0</span>
                        </div>
                        <div class="runtime-budget">
                            Bundle budget: target &lt; 25 kB gzip, documented CSMA baseline ~17 kB gzipped. Use <code>npm run analyze:bundle</code> for the current build report.
                        </div>
                    </div>
                </div>
            `;
            main.appendChild(runtimeSection);
            
            filtered.forEach(comp => {
                const section = document.createElement('section');
                section.className = 'component-section';
                section.id = comp.id;
                
                section.innerHTML = `
                    <div class="component-header">
                        <div class="component-header-top">
                            <h2 class="component-title">${comp.name}</h2>
                            ${comp.demoPath ? `<a class="component-demo-link" href="${comp.demoPath}" target="_blank" rel="noreferrer">Open demo</a>` : ''}
                        </div>
                        <p class="component-description">${comp.description}</p>
                    </div>
                    
                    <div class="component-demo">
                        <div class="preview-panel">
                            <div class="preview-panel-header">Preview</div>
                            <div class="preview-panel-content" data-background="solid">
                                ${comp.preview}
                            </div>
                        </div>
                        
                        <div class="code-panel">
                            <div class="code-panel-header">
                                <div class="code-panel-tabs">
                                    <button class="code-tab active" data-tab="html">HTML</button>
                                    ${comp.css ? '<button class="code-tab" data-tab="css">CSS</button>' : ''}
                                </div>
                                <button class="copy-btn" data-copy>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                    Copy
                                </button>
                            </div>
                            <div class="code-panel-content">
                                <pre class="code-block active" data-lang="html">${escapeHtml(comp.html)}</pre>
                                ${comp.css ? `<pre class="code-block" data-lang="css">${escapeHtml(comp.css)}</pre>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                
                main.appendChild(section);
                
                // Setup code tabs
                const tabs = section.querySelectorAll('.code-tab');
                const blocks = section.querySelectorAll('.code-block');
                
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        blocks.forEach(b => b.classList.remove('active'));
                        
                        tab.classList.add('active');
                        const lang = tab.dataset.tab;
                        section.querySelector(`.code-block[data-lang="${lang}"]`).classList.add('active');
                    });
                });
                
                // Setup copy button
                const copyBtn = section.querySelector('.copy-btn');
                const activeBlock = () => section.querySelector('.code-block.active');
                
                copyBtn.addEventListener('click', async () => {
                    const code = activeBlock().textContent;
                    await navigator.clipboard.writeText(code);
                    
                    copyBtn.dataset.copied = 'true';
                    copyBtn.innerHTML = `
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        Copied!
                    `;
                    
                    setTimeout(() => {
                        copyBtn.dataset.copied = 'false';
                        copyBtn.innerHTML = `
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy
                        `;
                    }, 2000);
                });
            });
        }
        
        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function coerceDatasetValue(value) {
            if (value === 'true') return true;
            if (value === 'false') return false;
            if (value !== '' && !Number.isNaN(Number(value))) return Number(value);
            return value;
        }

        function requiresTimestamp(eventName) {
            return new Set([
                'INTENT_COMMAND_OPEN',
                'INTENT_COMMAND_CLOSE',
                'INTENT_MODAL_OPEN',
                'INTENT_MODAL_CLOSE',
                'INTENT_DROPDOWN_TOGGLE'
            ]).has(eventName);
        }

        function updateRuntimeSnapshot() {
            const lifecycle = window.csma?.uiLifecycle || {};
            const renderMs = document.getElementById('runtime-render-ms');
            const initMs = document.getElementById('runtime-init-ms');
            const renderCount = document.getElementById('runtime-render-count');
            const cleanupCount = document.getElementById('runtime-cleanup-count');

            if (renderMs) renderMs.textContent = `${explorerMetrics.lastRenderDurationMs.toFixed(1)} ms`;
            if (initMs) initMs.textContent = `${Number(lifecycle.lastInitDurationMs || 0).toFixed(1)} ms`;
            if (renderCount) renderCount.textContent = String(explorerMetrics.renderCount);
            if (cleanupCount) cleanupCount.textContent = String(lifecycle.cleanupCount || 0);
        }

        function syncHashState() {
            if (!window.location.hash) return;
            const targetId = window.location.hash.slice(1);
            const link = document.querySelector(`.sidebar-nav-link[data-id="${targetId}"]`);
            if (link) {
                document.querySelectorAll('.sidebar-nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
            }
        }

        function bindObserver() {
            observer?.disconnect();
            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        document.querySelectorAll('.sidebar-nav-link').forEach(l => l.classList.remove('active'));
                        const activeLink = document.querySelector(`.sidebar-nav-link[data-id="${id}"]`);
                        if (activeLink) activeLink.classList.add('active');
                    }
                });
            }, { rootMargin: '-20% 0px -80% 0px' });

            document.querySelectorAll('.component-section').forEach(section => {
                observer.observe(section);
            });
        }

        function renderExplorer(filter = '') {
            const renderStartedAt = performance.now();
            uiCleanup?.();
            renderSidebar(filter);
            renderComponents(filter);
            uiCleanup = initUI(eventBus) || window.csma?.componentCleanup || (() => {});
            bindObserver();
            syncHashState();
            syncHeaderHeight();
            updateThemeIcon(html.dataset.theme || localStorage.getItem('theme') || 'light');
            explorerMetrics.renderCount += 1;
            explorerMetrics.lastRenderDurationMs = performance.now() - renderStartedAt;
            updateRuntimeSnapshot();
        }

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                renderExplorer(e.target.value.trim());
            }, 200);
        });

        renderExplorer();
    </script>
</body>
