<!DOCTYPE html>
<html lang="en" >

<head>
    <script src="../theme-loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textarea Component Demo - CSMA</title>
    <link rel="stylesheet" href="../../../css/main.css">
<link rel="stylesheet" href="./textarea.css">
    <style>
        body {
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            background: var(--fx-color-bg);
            color: var(--fx-color-fg);
        }

        h1,
        h2 {
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1.25rem;
            color: var(--fx-color-fg);
        }

        h2 {
            font-size: 1.25rem;
            margin-top: 2rem;
            color: var(--fx-color-fg-muted);
        }

        .intro {
            color: var(--fx-color-fg-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        section {
            margin-bottom: 2rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--fx-color-primary);
            text-decoration: none;
        }
    </style>
</head>

<body>
    <a href="../demos.html" class="back-link">← Back to Demos</a>
    <h1>Textarea Component</h1>
    <p class="intro">Multiline inputs with helpers, counts, and error states.</p>

    <section>
        <h2>Default</h2>
        <div class="textarea-group" data-state="default" data-max-length="500">
            <label for="textarea-1" class="textarea-label">Message</label>
            <textarea id="textarea-1" class="textarea" placeholder="Enter your message..." rows="4"></textarea>
            <div class="textarea-footer">
                <p class="textarea-helper">Describe your issue in detail</p>
                <span class="textarea-count" aria-live="polite">0 / 500</span>
            </div>
        </div>
    </section>

    <section>
        <h2>Error State</h2>
        <div class="textarea-group" data-state="error">
            <label for="textarea-2" class="textarea-label">Bio</label>
            <textarea id="textarea-2" class="textarea" placeholder="Tell us about yourself"></textarea>
            <div class="textarea-footer">
                <p class="textarea-error" role="alert">This field is required</p>
                <span class="textarea-count">0 / 500</span>
            </div>
        </div>
    </section>

    <section>
        <h2>Disabled</h2>
        <div class="textarea-group" data-state="disabled">
            <label for="textarea-3" class="textarea-label">Notes</label>
            <textarea id="textarea-3" class="textarea" placeholder="Can't edit"
                disabled>This content is locked.</textarea>
        </div>
    </section>

    <footer
        style="text-align: center; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--fx-color-border); color: var(--fx-color-fg-muted);">
        <p>Textarea Component - CSMA UI Library</p>
    </footer>
    <script type="module">
        import { EventBus } from '../../../runtime/EventBus.js';
        import { Contracts } from '../../../runtime/Contracts.js';
        import { initTextareaSystem } from './textarea.js';
        
        const eventBus = new EventBus();
        eventBus.contracts = Contracts;
        
        initTextareaSystem(eventBus);
    </script>
</body>

</html>
