<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Island Hydration Visibility Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 0;
      }
      .spacer {
        height: 180vh;
        background: linear-gradient(180deg, #f5f5f5 0%, #ffffff 100%);
      }
      .hydration-target {
        margin: 40px auto;
        max-width: 640px;
        padding: 32px;
        border-radius: 16px;
        border: 2px dashed #7a5af5;
        text-align: center;
        background: #fdf9ff;
      }
      .hydration-target[data-hydrated='true'] {
        border-color: #0f8b4c;
        background: #f2fff6;
      }
    </style>
  </head>
  <body>
    <main data-route="/test/hydration" aria-label="Hydration visibility test">
      <section class="spacer" aria-hidden="true"></section>

      <section
        class="hydration-target"
        data-island="hydration-test"
        data-trigger="visible"
        data-contract="HYDRATION_TEST"
        data-test-id="hydration-target"
      >
        <h1>Hydration Visibility Test</h1>
        <p data-test-id="status">Awaiting hydration…</p>
      </section>
    </main>
  </body>
</html>
