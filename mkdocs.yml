site_name: CSMA Kit Docs
site_description: Lean, secure, reactive Client-Side Microservices Architecture documentation
site_url: https://example.com/csma
repo_name: CSMA-SSMA/CSMA
repo_url: https://github.com/example/CSMA-SSMA
edit_uri: edit/main/docs/

theme:
  name: mkdocs

exclude_docs: |
  README.md

validation:
  omitted_files: ignore

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Overview: guides/csma-in-a-nutshell.md
    - Setup: guides/getting-started.md
    - Features: guides/features.md
    - Validation: guides/validation.md
    - PWA Setup: guides/pwa-setup.md
  - Guides:
    - Building Components: guides/building-components.md
    - Customizing Theme: guides/customizing-theme.md
    - For LLMs: guides/for-llms.md
    - CSS Foundation: css-foundation.md
    - Complete Guide: complete-csma-guide.md
  - API:
    - Core Services: api/core-services.md
    - LLM Service: api/llm-service.md
  - Advanced:
    - Contract Governance: advanced/contract-governance.md
    - Optimistic Sync: advanced/optimistic-sync.md
    - LLM Instructor: advanced/llm-instructor.md
  - Platforms:
    - Capacitor: platforms/capacitor.md
    - Neutralino: platforms/neutralino.md
  - Examples:
    - Todo App: examples/todo-app.md
  - Security:
    - Security Map: security/security-map.md
  - Operations:
    - AI System Map: operations/ai-system-map.md
    - Release Checklist: release-checklist.md
  - Roadmap:
    - Overview: roadmap/index.md
    - Priority Tracks:
      - OPFS Worker: roadmap/OPFS-worker.md
      - AI Modularity: roadmap/ai-modularity-tanstack.md
    - Proposed:
